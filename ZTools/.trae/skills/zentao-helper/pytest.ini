[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = . src
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=src
    --cov-report=term-missing
    --cov-report=html:tests/coverage_html
    --cov-fail-under=0
markers =
    unit: Unit tests
    integration: Integration tests (may call real APIs)
    slow: Slow tests
