# ZenTao Helper Configuration

zentao:
  # 禅道服务器地址
  base_url: "http://zentao.diansan.com/"
  # API 请求超时时间（秒）
  timeout: 30
  # 重试次数（指数退避）
  retry_times: 3
  # 重试退避因子（秒）
  retry_backoff: 1
  # 需求查询配置
  story_query:
    # 指定要查询的产品列表（为空则查询所有产品）
    # 例如: ["都江堰系统", "点三ERP"]
    # 默认只查询"都江堰系统"，提高查询效率
    products:
      - "都江堰系统"
    # 标题关键字过滤配置
    # 支持配置默认关键字列表，用于过滤需求标题
    # 为空列表表示不过滤，查询所有需求
    # 例如: ["面板", "订单"] 表示只查询标题包含"面板"或"订单"的需求
    keywords: ["特2"]
  # 任务创建配置
  task_creation:
    # 默认任务执行人（为空则不设置）
    default_assigned_to: "chenkeyu"
    # 需求等级对应的任务时长（小时）
    # A-: 1小时, A: 2小时, A+: 4小时, A++: 8小时, B: 空（需用户输入）
    grade_hours:
      "A-": 1
      "A": 2
      "A+": 4
      "A++": 8
      "B": null
    # 默认关联项目名称（为空则让用户选择）
    # 可以配置为固定的项目名称，例如: "都江堰项目"
    # 支持部分匹配，例如配置 "都江堰" 可以匹配 "都江堰项目"
    default_project_name: "研发中心"
    # 默认需求上线时间规则
    # 下周周一：next_monday
    # 下周周四：next_thursday
    # 下下周周一：next_next_monday
    default_online_time: "next_next_monday"
    # 默认任务截至时间规则
    # 本周周五：this_friday
    # 下周周五：next_friday
    default_deadline: "this_friday"
    # 任务时长超过4小时时，默认截至时间改为下周周五
    deadline_threshold_hours: 4

# 日志配置
logging:
  # 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
  # 生产环境建议用 WARNING，只显示警告和错误
  # 调试时可改为 INFO 或 DEBUG
  level: "WARNING"
  # 日志格式: json, text
  format: "text"

# NLP 配置
nlp:
  # 是否启用 NLP 调试模式
  debug: false
  # 预留：LLM API 配置（未来扩展）
  llm:
    enabled: false
    provider: ""  # openai, deepseek, 等
    api_key: ""
    model: ""

# 会话配置
session:
  # 会话加密密钥存储位置（keyring）
  keyring_service: "ZTools"
  keyring_username: "zentao-session"
  # 会话文件路径
  session_file: ".session.enc"
  # 会话有效期检查间隔（秒）
  check_interval: 300